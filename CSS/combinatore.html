<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        ol+h1{
            background-color:plum;
            color:aqua
        }
h3>p{
            color:aliceblue;
            background-color: purple;
        }
       ol>li{
            background-color: blue;
            margin:20px;
        }
        ul p{
            background-color: magenta;
        }
        ol~h1{
            background-color:brown;
        }
    </style>
</head>

    <h1>ordered list</h1>
    <ol>
        <li>list-1</li>
        <li>list-2</li>
        <li>list-3</li>
        <li>list-4</li>
    </ol>
    <h1>unorderd list</h1>
    <ul>
        <li><p>this is paragraph present in unorderd list</p></li>
        <li>unorderd list</li>
        <li>unorderd list</li>
        <li>unorderd list</li>
    </ul>
    
    <h1>heading in 3rd position</h1>
    <h3>
        <p>heading 4</p>
    </h3>
    
</body>
</html>
